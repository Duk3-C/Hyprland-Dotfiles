# Basic settings
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# Enable true color support (for modern terminals)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Colors: Dark slate blue primary, tones of gray
set -g status-style bg="#262626",fg="#a0a0a0"  # Very dark gray bg, medium gray fg

# Left side: Session name in slate blue on darker gray
set -g status-left-style bg="#483D8B",fg="#ffffff"
set -g status-left " #S #[bg=#262626] "

# Right side: Time and date in lighter gray
set -g status-right-style bg="#3a3a3a",fg="#cccccc"
set -g status-right " %H:%M %d-%b-%y "

# Window status: Inactive in dark gray, active highlighted with slate blue
set -g window-status-style bg="#303030",fg="#808080"
set -g window-status-current-style bg="#483D8B",fg="#ffffff",bold
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "

# Pane borders: Subtle grays, active in slate blue
set -g pane-border-style fg="#444444"
set -g pane-active-border-style fg="#483D8B"

# Message style: Slate blue text on dark gray
set -g message-style bg="#3a3a3a",fg="#483D8B",bold

# Mode style (e.g., copy mode)
set -g mode-style bg="#483D8B",fg="#ffffff"
